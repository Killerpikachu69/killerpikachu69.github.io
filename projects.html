<div class="page-header">
  <div>
    <div class="page-eyebrow">Portfolio</div>
    <h1>All <em>Projects</em></h1>
    <p class="page-sub">A collection of engineering work spanning machine design, process development, automation, and simulation.</p>
  </div>
  <div class="page-header-right" id="proj-header-right"></div>
</div>

<div class="filter-bar" id="filter-bar">
  <span class="filter-label">Filter by discipline</span>
  <span class="project-count" id="count-label"></span>
</div>

<main class="grid" id="grid"></main>
<!-- MODAL -->

<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="closeModal(null)">&#x2715;</button>
    <div id="m-hero"></div>
    <div class="modal-body">
      <div class="modal-eyebrow" id="m-eyebrow"></div>
      <div class="modal-title" id="m-title"></div>
      <div class="modal-org" id="m-org"></div>
      <div class="modal-tags" id="m-tags"></div>
      <div class="modal-desc" id="m-desc"></div>
      <ul class="modal-bullets" id="m-bullets"></ul>
      <div class="modal-specs" id="m-specs"></div>
      <div id="m-bottom-gallery"></div>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()"><div id="lightbox-content"></div></div>

<footer>
  <span class="footer-text"><a id="f-email" href="#"></a></span>
  <span class="footer-text">Hosted on <a href="https://pages.github.com" target="_blank">GitHub Pages</a></span>
</footer>

<script>
document.getElementById('f-email').textContent=ME.email;
document.getElementById('f-email').href='mailto:'+ME.email;
/* Auto project count */
document.getElementById('proj-header-right').innerHTML=PROJECTS.length+' projects<br>'+(FILTER_CATS.length-1)+' disciplines';

/* ── Filter Buttons (multi-category) ── */

let active='All';
const fb=document.getElementById('filter-bar');
const cl=document.getElementById('count-label');
FILTER_CATS.forEach(cat=>{const btn=document.createElement('button');btn.className='filter-btn'+(cat==='All'?' active':'');btn.textContent=cat;btn.addEventListener('click',()=>{active=cat;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');applyFilter()});fb.insertBefore(btn,cl)});
 /* ── Render Cards ── */
const grid=document.getElementById('grid');
PROJECTS.forEach((p,i)=>{const card=document.createElement('div');card.className='card anim-up';card.dataset.categories=JSON.stringify(p.categories);card.style.transitionDelay=(i%6)*.05+'s';const thumb=p.images&&p.images.length?p.images[0]:'';card.innerHTML=`${thumb?`<img class="card-image" src="${thumb}" alt="${p.title}" loading="lazy"/>`:`<div class="card-image-placeholder"><span class="placeholder-icon">&#x2699;</span></div>`}<div class="card-body"><div class="card-top"><div class="card-title">${p.title}</div><div class="card-year">${p.year}</div></div><div class="card-org">${p.org}</div><div class="card-desc">${p.desc}</div><div class="card-footer">${p.categories.map(c=>`<span class="tag cat-tag">${c}</span>`).join('')}${p.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div></div>`;card.addEventListener('click',()=>openModal(p));grid.appendChild(card)});

function applyFilter(){let n=0;document.querySelectorAll('.card').forEach(c=>{const cats=JSON.parse(c.dataset.categories);const show=active==='All'||cats.includes(active);c.classList.toggle('hidden',!show);if(show)n++});cl.innerHTML=`<span>${n}</span> / ${PROJECTS.length} projects`}
applyFilter();

 /* ── Modal ── */
function isVid(s){return /\.(mp4|webm|ogg)$/i.test(s)}
function mediaEl(src){return isVid(src)?`<video src="${src}" controls muted style="width:100%;display:block"></video>`:`<img src="${src}" alt="Project" style="width:100%;display:block"/>`}

function openModal(p){
  const imgs=p.images||[];
  document.getElementById('m-eyebrow').textContent=p.categories.join(' / ')+' - '+p.year;
  document.getElementById('m-title').textContent=p.title;
  document.getElementById('m-org').textContent=p.org;
  document.getElementById('m-tags').innerHTML=p.categories.map(c=>`<span class="tag cat-tag">${c}</span>`).join('')+p.tags.map(t=>`<span class="tag">${t}</span>`).join('');
  document.getElementById('m-desc').textContent=p.desc;
  document.getElementById('m-bullets').innerHTML=(p.bullets||[]).map(b=>`<li>${b}</li>`).join('');
  document.getElementById('m-specs').innerHTML=Object.entries(p.specs||{}).map(([k,v])=>`<div><div class="spec-label">${k}</div><div class="spec-value">${v}</div></div>`).join('');
  /* Header image */
  const hero=document.getElementById('m-hero');
  if(!imgs.length){hero.innerHTML=`<div class="img-note"><em>Add images:</em> set <code>images: ["img1.jpg",...]</code> in the PROJECTS array.</div><div class="modal-hero"><div class="modal-hero-placeholder">&#x2699;</div></div>`}else{hero.innerHTML=`<div class="modal-hero">${mediaEl(imgs[0])}</div>`}
  /* Bottom gallery grid */
  const bg=document.getElementById('m-bottom-gallery');
  if(imgs.length<=1){bg.innerHTML=''}else{const rest=imgs.slice(1);bg.innerHTML=`<div class="bottom-gallery"><div class="bottom-gallery-label">Project Gallery - ${imgs.length} images</div><div class="bottom-gallery-grid${rest.length<=4?' has-wide':''}">${rest.map(src=>`<div class="bg-item" onclick="event.stopPropagation();openLightbox('${src.replace(/'/g,"\\'")}')">${mediaEl(src)}</div>`).join('')}</div></div>`}
  document.getElementById('modal-overlay').classList.add('open');document.body.style.overflow='hidden';
}
function closeModal(e){if(e&&e.target!==document.getElementById('modal-overlay'))return;document.getElementById('modal-overlay').classList.remove('open');document.body.style.overflow='';document.querySelectorAll('video').forEach(v=>{if(v.pause)v.pause()})}
 /* Lightbox */
function openLightbox(src){document.getElementById('lightbox-content').innerHTML=isVid(src)?`<video src="${src}" controls autoplay style="max-width:95%;max-height:90vh;border-radius:8px"></video>`:`<img src="${src}" alt="Full view"/>`;document.getElementById('lightbox').classList.add('open')}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open')}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){if(document.getElementById('lightbox').classList.contains('open'))closeLightbox();else closeModal(null)}});
 /* Scroll animations */
const obs=new IntersectionObserver(e=>{e.forEach(x=>{if(x.isIntersecting)x.target.classList.add('visible')})},{threshold:.05,rootMargin:'0px 0px -30px 0px'});
document.querySelectorAll('.anim-up').forEach(el=>obs.observe(el));
window.addEventListener('scroll',()=>{document.getElementById('main-nav').classList.toggle('scrolled',window.scrollY>40)});
const glow=document.getElementById('cursor-glow');document.addEventListener('mousemove',e=>{glow.style.left=e.clientX+'px';glow.style.top=e.clientY+'px'});
</script>
